<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUNA Georgia — Quizzes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --teal-950:#0d2d27;
    --teal-800:#164a41;
    --teal-700:#1c5c50;
    --gold-500:#c9a24b;
    --gold-300:#e0c887;
    --cream-50:#faf6ec;
    --cream-100:#f2ecdb;
    --moss-100:#e6ede4;
    --ink-900:#241f1b;
    --ink-600:#57504a;
    --red-600:#a3402f;
    --green-700:#2f6b45;
    --shadow: 0 8px 30px rgba(13,45,39,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream-50);
    color:var(--ink-900);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(201,162,75,0.05) 0, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(22,74,65,0.06) 0, transparent 45%);
    pointer-events:none;
    z-index:0;
  }
  .wrap{
    position:relative; z-index:1;
    max-width:720px;
    margin:0 auto;
    padding:0 20px 60px;
  }

  /* ---------- Top banner ---------- */
  .banner{
    background:linear-gradient(120deg,var(--teal-950),var(--teal-800));
    color:var(--cream-50);
    padding:14px 20px;
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-size:14px; font-weight:600;
    letter-spacing:.02em;
    text-align:center;
  }
  .banner a{ color:var(--gold-300); text-decoration:none; border-bottom:1px solid rgba(224,200,135,0.5); }
  .banner a:hover{ border-bottom-color:var(--gold-300); }

  .brand{
    display:flex; flex-direction:column; align-items:center;
    text-align:center;
    padding:38px 0 8px;
  }
  .star{
    width:46px; height:46px;
    margin-bottom:10px;
  }
  .logo-img{
    width:64px; height:64px;
    object-fit:contain;
    margin-bottom:10px;
  }
  .brand h1{
    font-family:'Amiri',serif;
    font-size:30px;
    margin:0;
    color:var(--teal-800);
    letter-spacing:.01em;
  }
  .brand p.tag{
    margin:6px 0 0;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:var(--ink-600);
    font-weight:600;
  }

  .divider{
    display:flex; align-items:center; gap:10px;
    margin:22px 0;
    color:var(--gold-500);
  }
  .divider .line{ flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold-300),transparent); }
  .divider svg{ width:14px; height:14px; flex-shrink:0; }

  .card{
    background:#fff;
    border-radius:16px;
    box-shadow:var(--shadow);
    padding:32px;
    border:1px solid rgba(22,74,65,0.08);
  }

  h2.title{
    font-family:'Amiri',serif;
    font-size:22px;
    color:var(--teal-800);
    margin:0 0 6px;
  }
  p.sub{ color:var(--ink-600); font-size:14.5px; margin:0 0 22px; line-height:1.55; }

  label{ display:block; font-size:13px; font-weight:600; color:var(--ink-900); margin-bottom:6px; }
  input[type=text], input[type=tel]{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--moss-100);
    border-radius:10px;
    font-size:15px;
    font-family:'Inter',sans-serif;
    background:var(--cream-50);
    color:var(--ink-900);
    margin-bottom:18px;
    transition:border-color .15s;
  }
  input:focus{ outline:none; border-color:var(--teal-700); }
  input::placeholder{ color:#a49b8f; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--teal-800);
    color:#fff;
    border:none;
    padding:13px 26px;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    font-family:'Inter',sans-serif;
    cursor:pointer;
    transition:background .15s, transform .1s;
    width:100%;
  }
  .btn:hover{ background:var(--teal-700); }
  .btn:active{ transform:scale(0.98); }
  .btn:disabled{ background:#c8c2b8; cursor:not-allowed; }
  .btn.ghost{
    background:transparent;
    color:var(--teal-800);
    border:1.5px solid var(--teal-800);
  }
  .btn.ghost:hover{ background:var(--moss-100); }
  .btn.gold{ background:var(--gold-500); color:var(--teal-950); }
  .btn.gold:hover{ background:var(--gold-300); }

  .row{ display:flex; gap:12px; }
  .row .btn{ flex:1; }

  /* ---------- Quiz screen ---------- */
  .stars{ display:flex; gap:6px; justify-content:center; margin-bottom:22px; flex-wrap:wrap; }
  .stars svg{ width:20px; height:20px; opacity:.28; transition:opacity .2s, transform .2s; }
  .stars svg.filled{ opacity:1; transform:scale(1.1); }
  .stars svg.current{ opacity:1; }

  .timer{
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Inter',sans-serif; font-weight:700; font-size:14px;
    color:var(--teal-800); background:var(--moss-100);
    border-radius:999px; padding:7px 16px; margin:0 auto 20px; width:fit-content;
    transition:color .2s, background .2s;
  }
  .timer.warn{ color:var(--red-600); background:#f5e6e2; }
  .timer svg{ width:15px; height:15px; }

  .qnum{ font-size:12.5px; font-weight:700; color:var(--gold-500); text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px; }
  .qtext{ font-family:'Amiri',serif; font-size:20px; line-height:1.4; color:var(--ink-900); margin-bottom:22px; }

  .option{
    display:flex; align-items:flex-start; gap:12px;
    padding:14px 16px;
    border:1.5px solid var(--moss-100);
    border-radius:12px;
    margin-bottom:10px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
    font-size:15px;
    line-height:1.4;
  }
  .option:hover{ border-color:var(--gold-300); background:var(--cream-50); }
  .option.selected{ border-color:var(--teal-700); background:var(--moss-100); }
  .option .letter{
    flex-shrink:0;
    width:26px; height:26px;
    border-radius:50%;
    background:var(--teal-800);
    color:#fff;
    font-size:12.5px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .option.selected .letter{ background:var(--gold-500); color:var(--teal-950); }

  /* ---------- Results ---------- */
  .score-hero{ text-align:center; padding:10px 0 28px; }
  .score-big{ font-family:'Amiri',serif; font-size:56px; color:var(--teal-800); line-height:1; }
  .score-label{ font-size:13px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-600); font-weight:600; margin-top:6px; }
  .badge{
    display:inline-block; margin-top:14px;
    padding:6px 16px; border-radius:999px;
    font-size:13px; font-weight:700; letter-spacing:.03em;
  }
  .badge.pass{ background:#e3f0e6; color:var(--green-700); }
  .badge.fail{ background:#f5e6e2; color:var(--red-600); }

  .review{ border-top:1px solid var(--moss-100); padding-top:20px; margin-top:8px; }
  .review-item{ padding:16px 0; border-bottom:1px solid var(--moss-100); }
  .review-item:last-child{ border-bottom:none; }
  .review-q{ font-weight:600; font-size:14.5px; margin-bottom:8px; }
  .review-a{ font-size:13.5px; color:var(--ink-600); margin-bottom:4px; }
  .review-a.correct-mark{ color:var(--green-700); font-weight:600; }
  .review-a.wrong-mark{ color:var(--red-600); font-weight:600; }
  .review-exp{ font-size:13px; color:var(--ink-600); margin-top:6px; font-style:italic; }
  .tag{
    display:inline-block; font-size:11px; font-weight:700; padding:2px 8px;
    border-radius:6px; margin-right:6px; letter-spacing:.03em;
  }
  .tag.ok{ background:#e3f0e6; color:var(--green-700); }
  .tag.no{ background:#f5e6e2; color:var(--red-600); }

  /* ---------- Leaderboard ---------- */
  table{ width:100%; border-collapse:collapse; font-size:14px; }
  th{ text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-600); padding:8px 10px; border-bottom:2px solid var(--moss-100); }
  td{ padding:11px 10px; border-bottom:1px solid var(--moss-100); }
  tr.me{ background:var(--moss-100); }
  .rank-1 .rankpill{ background:var(--gold-500); color:var(--teal-950); }
  .rank-2 .rankpill{ background:#cfd8d5; color:var(--teal-950); }
  .rank-3 .rankpill{ background:#d9b98a; color:var(--teal-950); }
  .rank-1, .rank-2, .rank-3{ font-weight:600; }
  .medal{ margin-left:6px; font-size:14px; }
  .rankpill{ display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:var(--moss-100); color:var(--teal-800); font-weight:700; font-size:12.5px; }

  .footer-links{ text-align:center; margin-top:26px; font-size:12.5px; color:#a49b8f; }
  .footer-links button{ background:none; border:none; color:#a49b8f; text-decoration:underline; cursor:pointer; font-size:12.5px; font-family:inherit; }

  .empty{ text-align:center; padding:30px 10px; color:var(--ink-600); font-size:14px; }
  .loading{ text-align:center; padding:30px 10px; color:var(--ink-600); font-size:14px; }
  .error-msg{ background:#f5e6e2; color:var(--red-600); padding:10px 14px; border-radius:8px; font-size:13.5px; margin-bottom:16px; }

  @media (max-width:480px){
    .card{ padding:22px 18px; }
    .score-big{ font-size:44px; }
    .qtext{ font-size:18px; }
  }
</style>
</head>

<body>
<div class="banner">
  <span>☾ Join MUNA today —</span>
  <a href="https://muslimummah.org/" target="_blank" rel="noopener">muslimummah.org</a>
</div>

<div class="wrap">
  <div class="brand">
    <img src="logo.png" alt="MUNA Georgia" class="logo-img" id="logoImg"
         onerror="this.style.display='none'; document.getElementById('fallbackStar').style.display='block';">
    <svg class="star" viewBox="0 0 100 100" fill="none" id="fallbackStar" style="display:none;">
      <path d="M50 4 L58 34 L88 34 L64 52 L72 82 L50 64 L28 82 L36 52 L12 34 L42 34 Z" fill="#c9a24b"/>
    </svg>
    <h1>MUNA Georgia</h1>
    <p class="tag">South Zone Education Camp</p>
  </div>

  <div class="divider">
    <div class="line"></div>
    <svg viewBox="0 0 100 100"><path d="M50 4 L58 34 L88 34 L64 52 L72 82 L50 64 L28 82 L36 52 L12 34 L42 34 Z" fill="#c9a24b"/></svg>
    <div class="line"></div>
  </div>

  <div id="app"></div>

  <div class="footer-links" id="footerLinks"></div>
</div>

<script>
const QUESTIONS = [
  {
    q: "What is the specific term used to describe the absolute belief that Allah is unique and unparalleled in His names and attributes (Asma wa Sifat)?",
    options: ["Tawhid al-Uluhiyyah","Tawhid al-Rububiyyah","Tawhid al-Asma was-Sifat","Shirk al-Akbar"],
    correct: 2,
    exp: "Tawhid is categorized into three parts: Rububiyyah (Lordship), Uluhiyyah (Worship), and Asma was-Sifat (Names and Attributes)."
  },
  {
    q: "In the Hadith of Jibril, what term did Prophet Muhammad (ﷺ) use to describe worshipping Allah as if you see Him, knowing He sees you?",
    options: ["Islam","Iman","Ihsan","Taqwa"],
    correct: 2,
    exp: "Ihsan represents spiritual perfection and mindfulness — the highest of the three tiers mentioned in the Hadith (Islam, Iman, Ihsan)."
  },
  {
    q: "What term refers to the chain of narrators that verifies the authenticity of a saying of Prophet Muhammad (ﷺ)?",
    options: ["Matn","Isnad (or Sanad)","Sunnah","Fiqh"],
    correct: 1,
    exp: "Isnad (or Sanad) is the chain of narration used by scholars to trace and verify a Hadith back to the Prophet (ﷺ)."
  },
  {
    q: "How many months are designated as sacred (Al-Ashhur al-Hurum) in the Islamic lunar calendar, during which fighting is strictly forbidden?",
    options: ["Three (3)","Four (4)","Five (5)","Six (6)"],
    correct: 1,
    exp: "The four sacred months are Dhul-Qi'dah, Dhul-Hijjah, Muharram, and Rajab."
  },
  {
    q: "According to mainstream Sunni belief, what happens to a Muslim's faith when he commits a major sin?",
    options: ["He immediately leaves Islam","His faith decreases but he remains Muslim","He becomes an angel","His deeds no longer matter"],
    correct: 1,
    exp: "Mainstream Sunni belief holds that a major sin weakens a person's Iman, but does not remove them from Islam entirely."
  },
  {
    q: "Which statement correctly defines Islam?",
    options: ["A cultural identity only","Submission and obedience to Allah","Philosophy of ancient Arabs","Tribal law"],
    correct: 1,
    exp: "Islam literally means submission — a complete surrender and obedience to the will of Allah."
  },
  {
    q: "What is the condition that makes Hajj obligatory upon a Muslim?",
    options: ["Wealth only","Age only","Ability and capability","Marriage"],
    correct: 2,
    exp: "Hajj is only obligatory upon those who possess the physical and financial ability (istita'ah) to perform it."
  },
  {
    q: "What is one of the greatest purposes of Zakah?",
    options: ["Increasing luxury","Social justice and helping the needy","Trade competition","Political power"],
    correct: 1,
    exp: "Zakah redistributes wealth and upholds social justice by supporting those in need."
  },
  {
    q: "What is the primary objective of an Islamic movement (Islamic Organization)?",
    options: ["Political power","Economic development","Establishing Allah's Deen in all aspects of life","Social welfare only"],
    correct: 2,
    exp: "An Islamic movement's central aim is establishing Allah's Deen comprehensively — in belief, worship, and daily life."
  },
  {
    q: "The foundation of an Islamic organization is:",
    options: ["Nationalism","Tribalism","Aqidah (Islamic belief)","Language"],
    correct: 2,
    exp: "Aqidah — sound Islamic belief — is the bedrock upon which an Islamic organization's structure and purpose are built."
  }
];

const ADMIN_PASSWORD = "MUNAGA2026"; // organizer can change this
const TIME_LIMIT_SECONDS = 600; // 10 minutes
let timerInterval = null;

let state = {
  screen: "welcome",
  name: "",
  phone: "",
  current: 0,
  answers: new Array(QUESTIONS.length).fill(null),
  startTime: null,
  score: 0,
  timeTaken: 0,
  submissionId: null
};

const app = document.getElementById("app");
const footerLinks = document.getElementById("footerLinks");

function starSVG(extraClass){
  return `<svg class="${extraClass}" viewBox="0 0 100 100"><path d="M50 4 L58 34 L88 34 L64 52 L72 82 L50 64 L28 82 L36 52 L12 34 L42 34 Z" fill="currentColor" style="color:#c9a24b"/></svg>`;
}

function renderFooter(){
  if(state.screen === "welcome"){
    footerLinks.innerHTML = `<button onclick="goLeaderboard()">View leaderboard</button> &nbsp;·&nbsp; <button onclick="goAdmin()">Organizer login</button>`;
  } else if(state.screen === "leaderboard"){
    footerLinks.innerHTML = `<button onclick="goWelcome()">Back to quiz</button>`;
  } else if(state.screen === "admin"){
    footerLinks.innerHTML = `<button onclick="goWelcome()">Back to quiz</button>`;
  } else {
    footerLinks.innerHTML = "";
  }
}

function goWelcome(){ state.screen = "welcome"; render(); }
function goLeaderboard(){ state.screen = "leaderboard"; render(); loadLeaderboard(false); }
function goAdmin(){ state.screen = "adminLogin"; render(); }

/* ---------------- Welcome ---------------- */
function renderWelcome(){
  app.innerHTML = `
    <div class="card">
      <h2 class="title">Knowledge Test</h2>
      <p class="sub">10 questions on Islamic belief and organization, from the South Zone Education Camp (June 28, 2026). You'll have <strong>10 minutes</strong> to complete it once you start. Enter your details to begin — your score will appear on the leaderboard.</p>
      <label for="nameInput">Full name</label>
      <input type="text" id="nameInput" placeholder="e.g. Abdullah Rahman" value="${escapeHtml(state.name)}">
      <label for="phoneInput">Phone number</label>
      <input type="tel" id="phoneInput" placeholder="e.g. (404) 555-0192" value="${escapeHtml(state.phone)}">
      <button class="btn" id="startBtn">Start quiz</button>
      <div id="formError"></div>
    </div>
  `;
  document.getElementById("startBtn").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    const phone = document.getElementById("phoneInput").value.trim();
    if(!name || !phone){
      document.getElementById("formError").innerHTML = `<p class="error-msg" style="margin-top:14px;">Please enter both your name and phone number.</p>`;
      return;
    }
    state.name = name;
    state.phone = phone;
    state.current = 0;
    state.answers = new Array(QUESTIONS.length).fill(null);
    state.startTime = Date.now();
    state.autoSubmitted = false;
    state.screen = "quiz";
    render();
    startTimer();
  };
}

/* ---------------- Quiz ---------------- */
function renderQuiz(){
  const i = state.current;
  const q = QUESTIONS[i];
  const selected = state.answers[i];

  let starsHtml = QUESTIONS.map((_, idx) => {
    let cls = "";
    if(idx === i) cls = "current";
    else if(state.answers[idx] !== null) cls = "filled";
    return starSVG(cls);
  }).join("");

  let optionsHtml = q.options.map((opt, idx) => {
    const letter = String.fromCharCode(65+idx);
    const sel = selected === idx ? "selected" : "";
    return `<div class="option ${sel}" onclick="selectAnswer(${idx})">
      <div class="letter">${letter}</div>
      <div>${escapeHtml(opt)}</div>
    </div>`;
  }).join("");

  const remaining = getRemainingSeconds();
  app.innerHTML = `
    <div class="card">
      <div class="timer ${remaining <= 60 ? 'warn' : ''}" id="timerPill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span id="timerText">${formatTime(remaining)}</span>
      </div>
      <div class="stars">${starsHtml}</div>
      <div class="qnum">Question ${i+1} of ${QUESTIONS.length}</div>
      <div class="qtext">${escapeHtml(q.q)}</div>
      ${optionsHtml}
      <div class="row" style="margin-top:22px;">
        ${i > 0 ? `<button class="btn ghost" onclick="prevQ()">Back</button>` : ""}
        <button class="btn" id="nextBtn" ${selected === null ? "disabled" : ""} onclick="${i === QUESTIONS.length-1 ? "submitQuiz()" : "nextQ()"}">
          ${i === QUESTIONS.length-1 ? "Submit answers" : "Next question"}
        </button>
      </div>
    </div>
  `;
}

function selectAnswer(idx){
  state.answers[state.current] = idx;
  renderQuiz();
}
function nextQ(){ if(state.current < QUESTIONS.length-1){ state.current++; renderQuiz(); } }
function prevQ(){ if(state.current > 0){ state.current--; renderQuiz(); } }

async function submitQuiz(autoSubmitted){
  stopTimer();
  state.autoSubmitted = !!autoSubmitted;
  let score = 0;
  QUESTIONS.forEach((q, idx) => { if(state.answers[idx] === q.correct) score++; });
  state.score = score;
  state.timeTaken = Math.min(TIME_LIMIT_SECONDS, Math.round((Date.now() - state.startTime)/1000));
  state.submissionId = "sub_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);

  const entry = {
    name: state.name,
    phone: state.phone,
    score: state.score,
    total: QUESTIONS.length,
    timeTaken: state.timeTaken,
    submittedAt: new Date().toISOString(),
    answers: state.answers
  };

  try{
    await db.collection("submissions").add(entry);
  }catch(err){
    console.error("Could not save submission:", err);
  }

  state.screen = "results";
  render();
}

/* ---------------- Results ---------------- */
function renderResults(){
  const pct = Math.round((state.score/QUESTIONS.length)*100);
  const passed = pct >= 60;

  let reviewHtml = QUESTIONS.map((q, idx) => {
    const userIdx = state.answers[idx];
    const correctIdx = q.correct;
    const isCorrect = userIdx === correctIdx;
    return `
      <div class="review-item">
        <div><span class="tag ${isCorrect ? 'ok' : 'no'}">${isCorrect ? 'Correct' : 'Incorrect'}</span></div>
        <div class="review-q" style="margin-top:8px;">${idx+1}. ${escapeHtml(q.q)}</div>
        ${!isCorrect ? `<div class="review-a wrong-mark">Your answer: ${userIdx === null ? "No answer given" : escapeHtml(q.options[userIdx])}</div>` : ""}
        <div class="review-a correct-mark">Correct answer: ${escapeHtml(q.options[correctIdx])}</div>
        <div class="review-exp">${escapeHtml(q.exp)}</div>
      </div>
    `;
  }).join("");

  app.innerHTML = `
    <div class="card">
      <div class="score-hero">
        <div class="score-big">${state.score}/${QUESTIONS.length}</div>
        <div class="score-label">Your score · ${pct}%</div>
        <div class="badge ${passed ? 'pass' : 'fail'}">${passed ? 'Well done!' : 'Keep learning'}</div>
        ${state.autoSubmitted ? `<p class="error-msg" style="margin-top:14px; text-align:left;">Time's up! Your quiz was submitted automatically at the 10-minute mark.</p>` : ""}
        <p class="sub" style="margin-top:14px;">Completed in ${formatTime(state.timeTaken)}. Thank you, ${escapeHtml(state.name)} — your result has been recorded.</p>
      </div>
      <div class="row" style="margin-bottom:6px;">
        <button class="btn gold" onclick="goLeaderboard()">View leaderboard</button>
      </div>
      <div class="review">${reviewHtml}</div>
    </div>
  `;
}

/* ---------------- Leaderboard ---------------- */
async function fetchAllEntries(){
  const snapshot = await db.collection("submissions").get();
  const entries = [];
  snapshot.forEach(doc => entries.push(doc.data()));
  return entries;
}

async function loadLeaderboard(){
  const el = document.getElementById("leaderboardBody");
  if(!el) return;
  el.innerHTML = `<div class="loading">Loading results…</div>`;
  try{
    const entries = await fetchAllEntries();
    if(entries.length === 0){
      el.innerHTML = `<div class="empty">No submissions yet — be the first to complete the quiz!</div>`;
      return;
    }
    entries.sort((a,b) => {
      if(b.score !== a.score) return b.score - a.score;
      return a.timeTaken - b.timeTaken;
    });

    let rows = entries.map((e, idx) => {
      const isMe = e.name === state.name && e.phone === state.phone && e.score === state.score;
      return `
        <tr class="${isMe ? 'me' : ''} rank-${idx+1}">
          <td><span class="rankpill">${idx+1}</span></td>
          <td>${escapeHtml(e.name)}</td>
          <td>${maskPhone(e.phone)}</td>
          <td>${e.score}/${e.total}</td>
          <td>${formatTime(e.timeTaken)}</td>
        </tr>
      `;
    }).join("");

    el.innerHTML = `
      <p class="sub" style="margin-bottom:14px;">${entries.length} submission${entries.length === 1 ? '' : 's'} total.</p>
      <table>
        <thead><tr><th>Rank</th><th>Name</th><th>Phone</th><th>Score</th><th>Time</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }catch(err){
    el.innerHTML = `<div class="error-msg">Couldn't load the leaderboard right now. Please try refreshing.</div>`;
    console.error(err);
  }
}

function renderLeaderboard(){
  app.innerHTML = `
    <div class="card">
      <h2 class="title">Leaderboard</h2>
      <p class="sub">Ranked by score, then by fastest completion time.</p>
      <div id="leaderboardBody"><div class="loading">Loading results…</div></div>
      <button class="btn ghost" style="margin-top:18px;" onclick="loadLeaderboard()">Refresh</button>
    </div>
  `;
  loadLeaderboard();
}

/* ---------------- Admin ---------------- */

      <p class="sub">Enter the organizer password to view full submission details.</p>
      <label for="pwInput">Password</label>
      <input type="text" id="pwInput" placeholder="Password">

function checkAdminPassword(){

    state.screen = "admin";
    render();
  } else {
    document.getElementById("pwError").innerHTML = `<p class="error-msg" style="margin-top:10px;">Incorrect password.</p>`;
  }

async function loadAdminData(){
  const el = document.getElementById("adminBody");
  if(!el) return;
  el.innerHTML = `<div class="loading">Loading submissions…</div>`;
  try{
    const entries = await fetchAllEntries();
    if(entries.length === 0){
      el.innerHTML = `<div class="empty">No submissions yet.</div>`;
      return;
    }
    entries.sort((a,b) => {
      if(b.score !== a.score) return b.score - a.score;
      return a.timeTaken - b.timeTaken;
    });

    let rows = entries.map((e, idx) => `
      <tr class="rank-${idx+1}">
        <td><span class="rankpill">${idx+1}</span></td>
        <td>${escapeHtml(e.name)}${idx===0?'<span class="medal">🥇</span>':idx===1?'<span class="medal">🥈</span>':idx===2?'<span class="medal">🥉</span>':''}</td>
        <td>${escapeHtml(e.phone)}</td>
        <td>${e.score}/${e.total}</td>
        <td>${formatTime(e.timeTaken)}</td>
        <td>${new Date(e.submittedAt).toLocaleString()}</td>
      </tr>
    `).join("");

    el.innerHTML = `
      <p class="sub" style="margin-bottom:14px;">${entries.length} submission${entries.length === 1 ? '' : 's'} total.</p>
      <table>
        <thead><tr><th>Rank</th><th>Name</th><th>Phone</th><th>Score</th><th>Time</th><th>Submitted</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <button class="btn ghost" style="margin-top:18px;" onclick="copyCSV()">Copy as CSV</button>
      <button class="btn ghost" style="margin-top:10px;" onclick="loadAdminData()">Refresh</button>
    `;
    window._adminEntries = entries;
  }catch(err){
    el.innerHTML = `<div class="error-msg">Couldn't load submissions right now. Please try refreshing.</div>`;
    console.error(err);
  }
}

function copyCSV(){
  const entries = window._adminEntries || [];
  let csv = "Rank,Name,Phone,Score,Total,Time (s),Submitted At\n";
  entries.forEach((e, idx) => {
    csv += `${idx+1},"${e.name.replace(/"/g,'""')}","${e.phone}",${e.score},${e.total},${e.timeTaken},"${e.submittedAt}"\n`;
  });
  navigator.clipboard.writeText(csv).then(() => alert("CSV copied to clipboard.")).catch(() => alert("Could not copy — please try again."));
}

function renderAdmin(){
  app.innerHTML = `
    <div class="card">
      <h2 class="title">Organizer view</h2>
      <p class="sub">Full submissions with contact numbers, ranked by score then speed. This data is visible to anyone with the organizer password.</p>
      <div id="adminBody"><div class="loading">Loading submissions…</div></div>
    </div>
  `;
  loadAdminData();
}

/* ---------------- Utilities ---------------- */
function getRemainingSeconds(){
  const elapsed = Math.floor((Date.now() - state.startTime)/1000);
  return Math.max(0, TIME_LIMIT_SECONDS - elapsed);
}
function startTimer(){
  stopTimer();
  timerInterval = setInterval(() => {
    const remaining = getRemainingSeconds();
    const textEl = document.getElementById('timerText');
    const pillEl = document.getElementById('timerPill');
    if(textEl) textEl.textContent = formatTime(remaining);
    if(pillEl) pillEl.classList.toggle('warn', remaining <= 60);
    if(remaining <= 0){
      stopTimer();
      submitQuiz(true);
    }
  }, 1000);
}
function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
}

function maskPhone(phone){
  const digits = phone.replace(/\D/g,"");
  if(digits.length < 4) return "••••";
  return "•••-•••-" + digits.slice(-4);
}
function formatTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return `${m}:${String(s).padStart(2,"0")}`;
}
function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

/* ---------------- Router ---------------- */
function render(){
  renderFooter();
  if(state.screen === "welcome") renderWelcome();
  else if(state.screen === "quiz") renderQuiz();
  else if(state.screen === "results") renderResults();
  else if(state.screen === "leaderboard") renderLeaderboard();
  else if(state.screen === "adminLogin") renderAdminLogin();
  else if(state.screen === "admin") renderAdmin();
}

render();
</script>
